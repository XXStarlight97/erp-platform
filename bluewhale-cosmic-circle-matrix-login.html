<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蓝鲸ERP平台 - 圆形矩阵登录</title>
    <style>
        :root {
            --cyan: #46dcff;
            --blue: #2f7cff;
            --violet: #a85cff;
            --text: #f5fbff;
            --muted: #a9c5de;
            --panel: rgba(3, 12, 28, 0.78);
            --panel-deep: rgba(1, 7, 18, 0.84);
            --line: rgba(111, 205, 255, 0.28);
            --font: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            overflow: hidden;
            color: var(--text);
            font-family: var(--font);
            background: #02040b;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .page {
            position: relative;
            width: 100vw;
            min-height: 100vh;
            display: grid;
            place-items: center;
            isolation: isolate;
            padding: 32px;
        }

        .page::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: -4;
            background: url("assets/login-cosmic-horizon-bg.png") center / cover no-repeat;
        }

        .page::after {
            content: "";
            position: absolute;
            inset: 0;
            z-index: -3;
            background:
                radial-gradient(circle at 50% 45%, rgba(48, 120, 255, 0.12), transparent 34%),
                radial-gradient(circle at 54% 55%, rgba(168, 92, 255, 0.10), transparent 42%),
                linear-gradient(180deg, rgba(0, 2, 10, 0.24), rgba(0, 2, 10, 0.18) 42%, rgba(0, 2, 10, 0.08));
            pointer-events: none;
        }

        .matrix-layer {
            position: absolute;
            inset: 0;
            z-index: -2;
            pointer-events: none;
            overflow: hidden;
        }

        .matrix-panel {
            position: absolute;
            top: 5vh;
            bottom: 29vh;
            display: flex;
            align-items: flex-start;
            gap: clamp(10px, 1.05vw, 18px);
            opacity: 0.82;
        }

        .matrix-panel.left {
            left: 4.5vw;
            right: calc(50% + 250px);
            justify-content: flex-end;
        }

        .matrix-panel.right {
            left: calc(50% + 250px);
            right: 4.5vw;
            justify-content: flex-start;
        }

        .matrix-panel::before {
            content: "";
            position: absolute;
            inset: -8vh -3vw -4vh;
            background:
                linear-gradient(90deg, transparent, rgba(38, 117, 255, 0.14), transparent),
                radial-gradient(circle at 50% 32%, rgba(89, 91, 255, 0.18), transparent 54%);
            filter: blur(18px);
            opacity: 0.62;
        }

        .matrix-column {
            position: relative;
            width: clamp(34px, 3.4vw, 58px);
            display: grid;
            gap: clamp(14px, 1.62vw, 26px);
        }

        .matrix-column.c1 { margin-top: 1vh; }
        .matrix-column.c2 { margin-top: 8vh; }
        .matrix-column.c3 { margin-top: 3vh; }
        .matrix-column.c4 { margin-top: 13vh; }
        .matrix-column.c5 { margin-top: 6vh; }
        .matrix-column.c6 { margin-top: 16vh; }
        .matrix-column.c7 { margin-top: 10vh; }
        .matrix-column.c8 { margin-top: 2vh; }
        .matrix-column.c9 { margin-top: 12vh; }
        .matrix-column.c10 { margin-top: 5vh; }

        .matrix-tile {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 50%;
            opacity: var(--alpha, 0.24);
            background:
                radial-gradient(circle at 28% 24%, rgba(255, 255, 255, 0.45), rgba(255,255,255,0.08) 16%, transparent 32%),
                radial-gradient(circle at 72% 78%, rgba(2, 8, 28, 0.42), transparent 48%),
                linear-gradient(145deg, rgba(82, 199, 255, var(--hi, 0.36)), rgba(43, 115, 255, var(--mid, 0.28)) 58%, rgba(112, 78, 255, var(--lo, 0.22)));
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.16),
                inset -10px -12px 22px rgba(1, 8, 30, 0.28),
                0 0 20px rgba(48, 132, 255, 0.20);
            animation: matrix-orb-pulse 7.8s ease-in-out infinite;
            animation-delay: var(--delay, 0s);
        }

        .matrix-tile.hot {
            opacity: 0.72;
            background:
                radial-gradient(circle at 28% 22%, rgba(255, 255, 255, 0.66), transparent 22%),
                radial-gradient(circle at 72% 76%, rgba(1, 8, 30, 0.38), transparent 48%),
                linear-gradient(145deg, #65d7ff, #2f7cff 56%, #7561ff);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.30),
                inset -12px -14px 24px rgba(1, 8, 30, 0.32),
                0 0 30px rgba(56, 139, 255, 0.50),
                0 0 52px rgba(117, 97, 255, 0.22);
        }

        .matrix-tile.module {
            position: relative;
            display: grid;
            place-items: center;
            align-content: center;
            gap: 3px;
            opacity: 0.88;
            color: rgba(204, 238, 255, 0.84);
            background:
                radial-gradient(circle at 30% 22%, rgba(255, 255, 255, 0.64), transparent 20%),
                radial-gradient(circle at 72% 78%, rgba(2, 8, 30, 0.44), transparent 48%),
                linear-gradient(145deg, rgba(38, 126, 255, 0.95), rgba(10, 45, 126, 0.92) 56%, rgba(47, 47, 154, 0.86));
            box-shadow:
                inset 0 1px 0 rgba(180, 225, 255, 0.24),
                inset -12px -14px 24px rgba(1, 8, 30, 0.34),
                0 0 26px rgba(35, 104, 235, 0.38),
                0 0 52px rgba(117, 97, 255, 0.16);
            overflow: visible;
        }

        .matrix-tile.module::before {
            content: "";
            position: absolute;
            inset: -8px;
            border-radius: inherit;
            background: radial-gradient(circle, rgba(70, 220, 255, 0.18), transparent 66%);
            opacity: 0.72;
            filter: blur(1px);
            pointer-events: none;
        }

        .matrix-tile.module::after {
            content: none;
        }

        .matrix-panel.right .matrix-tile.module::after {
            content: none;
        }

        .module-icon {
            display: none;
        }

        .module-label {
            position: relative;
            z-index: 1;
            padding: 0;
            border-radius: 0;
            background: transparent;
            border: 0;
            backdrop-filter: none;
            font-size: clamp(8px, 0.66vw, 11px);
            line-height: 1;
            font-weight: 800;
            color: rgba(211, 238, 255, 0.88);
            text-shadow:
                0 1px 7px rgba(0, 4, 18, 0.72),
                0 0 12px rgba(70, 220, 255, 0.34);
            letter-spacing: 0;
            white-space: nowrap;
        }

        .matrix-panel.right .module-label {
            left: auto;
            right: auto;
        }

        .matrix-tile.dim {
            opacity: 0.14;
            filter: saturate(0.85);
        }

        .matrix-tile.blank {
            visibility: hidden;
        }

        .matrix-column .matrix-tile:nth-child(2n) {
            transform: scale(0.84);
            --delay: -1.4s;
        }

        .matrix-column .matrix-tile:nth-child(3n) {
            transform: scale(1.12);
            --delay: -3.1s;
        }

        .matrix-column .matrix-tile:nth-child(4n) {
            transform: scale(0.72);
            --delay: -4.8s;
        }

        .matrix-column .matrix-tile.module {
            transform: none;
        }

        @keyframes matrix-orb-pulse {
            0%, 100% {
                filter: brightness(0.92) saturate(0.96);
                box-shadow:
                    inset 0 1px 0 rgba(255, 255, 255, 0.16),
                    inset -10px -12px 22px rgba(1, 8, 30, 0.28),
                    0 0 18px rgba(48, 132, 255, 0.18);
            }
            48% {
                filter: brightness(1.16) saturate(1.08);
                box-shadow:
                    inset 0 1px 0 rgba(255, 255, 255, 0.22),
                    inset -10px -12px 22px rgba(1, 8, 30, 0.26),
                    0 0 28px rgba(48, 132, 255, 0.30),
                    0 0 48px rgba(117, 97, 255, 0.14);
            }
        }

        .energy-layer {
            position: absolute;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .energy-layer svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .energy-line {
            fill: none;
            stroke: url("#energyStroke");
            stroke-width: 1.35;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0.34;
            filter: url("#softGlow");
        }

        .energy-line.secondary {
            opacity: 0.20;
            stroke-width: 1;
        }

        .energy-pulse {
            fill: none;
            stroke: url("#pulseStroke");
            stroke-width: 2.15;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 22 220;
            stroke-dashoffset: 240;
            opacity: 0.78;
            filter: url("#pulseGlow");
            animation: energy-flow 4.8s linear infinite;
        }

        .energy-pulse.delay-1 { animation-delay: -1.2s; }
        .energy-pulse.delay-2 { animation-delay: -2.4s; }
        .energy-pulse.delay-3 { animation-delay: -3.6s; }

        .energy-node {
            fill: rgba(83, 193, 255, 0.82);
            filter: url("#pulseGlow");
            opacity: 0.56;
        }

        @keyframes energy-flow {
            to {
                stroke-dashoffset: 0;
            }
        }

        .login-shell {
            position: relative;
            width: min(340px, calc(100vw - 40px));
            padding: 2px;
            border-radius: 22px;
            background:
                linear-gradient(135deg, rgba(48, 139, 255, 0.72), rgba(41, 91, 214, 0.36) 42%, rgba(111, 67, 255, 0.62));
            box-shadow:
                0 28px 82px rgba(0, 0, 0, 0.54),
                0 0 62px rgba(40, 116, 255, 0.22),
                0 0 34px rgba(104, 79, 255, 0.14);
            transform: translateY(-9vh);
        }

        .login-shell::before {
            content: "";
            position: absolute;
            inset: -24px;
            z-index: -1;
            border-radius: 34px;
            background:
                radial-gradient(circle at 14% 17%, rgba(48, 139, 255, 0.30), transparent 36%),
                radial-gradient(circle at 88% 76%, rgba(111, 67, 255, 0.28), transparent 34%);
            filter: blur(24px);
            opacity: 0.76;
        }

        .login-card {
            min-height: 380px;
            padding: 31px 25px 28px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background:
                linear-gradient(180deg, rgba(5, 17, 42, 0.82), rgba(1, 7, 20, 0.90)),
                radial-gradient(circle at 54% 100%, rgba(47, 124, 255, 0.18), transparent 50%),
                radial-gradient(circle at 90% 0%, rgba(111, 67, 255, 0.13), transparent 36%);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.14),
                inset 0 -46px 76px rgba(32, 106, 255, 0.11);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        .brand {
            display: grid;
            grid-template-columns: 46px 1fr;
            align-items: center;
            column-gap: 14px;
            row-gap: 10px;
            margin-bottom: 27px;
        }

        .brand > div:not(.brand-mark) {
            min-width: 0;
        }

        .brand-mark {
            position: relative;
            flex: 0 0 auto;
            width: 46px;
            height: 46px;
            border-radius: 14px;
            background: linear-gradient(135deg, #2378ff 4%, #35b7ff 58%, #6d43ff 100%);
            box-shadow:
                0 16px 38px rgba(35, 142, 255, 0.30),
                0 0 38px rgba(90, 82, 255, 0.18),
                inset 0 1px 0 rgba(255, 255, 255, 0.34);
            transform: translateY(3px);
        }

        .brand-mark svg,
        .brand-mark img {
            position: absolute;
            inset: 50% auto auto 50%;
            width: 28px;
            height: 28px;
            color: rgba(255, 255, 255, 0.96);
            filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.26));
            transform: translate(-50%, -50%);
            object-fit: contain;
        }

        .brand-title {
            font-size: clamp(20px, 2vw, 24px);
            line-height: 1;
            font-weight: 900;
            letter-spacing: 0;
            color: transparent;
            background: linear-gradient(100deg, #6fa4ff, #368aff 56%, #8b6dff);
            background-clip: text;
            -webkit-background-clip: text;
            text-shadow: 0 0 24px rgba(55, 128, 255, 0.18);
        }

        .brand-subtitle {
            margin-top: 8px;
            color: var(--muted);
            font-size: clamp(12px, 1.02vw, 13.5px);
            line-height: 1.35;
            font-weight: 500;
            letter-spacing: 0;
        }

        .brand-note {
            grid-column: 1 / -1;
            margin-top: 2px;
            max-width: 286px;
            color: rgba(169, 197, 222, 0.78);
            font-size: clamp(10px, 0.85vw, 11.5px);
            line-height: 1.5;
            font-weight: 500;
            letter-spacing: 0;
        }

        .form {
            display: grid;
            gap: 16px;
        }

        .field {
            position: relative;
            display: flex;
            align-items: center;
            min-height: 40px;
            padding: 0 13px;
            border: 2px solid rgba(67, 151, 255, 0.24);
            border-radius: 12px;
            background: rgba(0, 6, 18, 0.72);
            box-shadow:
                inset 0 0 0 1px rgba(255, 255, 255, 0.02),
                0 0 0 rgba(70, 220, 255, 0);
            transition: border-color .2s ease, box-shadow .2s ease, background .2s ease;
        }

        .field:focus-within {
            border-color: rgba(73, 151, 255, 0.76);
            background: rgba(0, 9, 24, 0.82);
            box-shadow: 0 0 0 5px rgba(73, 151, 255, 0.08);
        }

        .field input {
            width: 100%;
            min-width: 0;
            border: 0;
            outline: 0;
            color: #ffffff;
            background: transparent;
            font: inherit;
            font-size: clamp(11px, 1.05vw, 13px);
            font-weight: 800;
            letter-spacing: 0;
        }

        .field input::placeholder {
            color: rgba(202, 227, 248, 0.50);
        }

        .password {
            letter-spacing: 4px;
        }

        .login-button {
            width: 100%;
            min-height: 42px;
            margin-top: 12px;
            border: 0;
            border-radius: 13px;
            color: rgba(1, 15, 33, 0.94);
            cursor: pointer;
            background: linear-gradient(100deg, #39b9ff, #2f7cff 58%, #8066ff);
            box-shadow:
                0 18px 46px rgba(50, 132, 255, 0.32),
                inset 0 1px 0 rgba(255, 255, 255, 0.28);
            font: inherit;
            font-size: clamp(11px, 1.1vw, 13px);
            font-weight: 900;
            letter-spacing: 8px;
            text-indent: 8px;
            transition: transform .18s ease, filter .18s ease, box-shadow .18s ease;
        }

        .login-button:hover {
            filter: brightness(1.08);
            transform: translateY(-1px);
            box-shadow:
                0 22px 58px rgba(50, 132, 255, 0.40),
                0 0 30px rgba(128, 102, 255, 0.22),
                inset 0 1px 0 rgba(255, 255, 255, 0.32);
        }

        .links {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 24px;
            margin-top: 20px;
        }

        .links a {
            color: #9df2ff;
            text-decoration: none;
            font-size: clamp(10px, 1vw, 12px);
            line-height: 1;
            font-weight: 900;
            letter-spacing: 0;
            text-shadow: 0 0 22px rgba(70, 220, 255, 0.22);
            transition: color .2s ease, text-shadow .2s ease;
        }

        .links a:hover {
            color: #d7fbff;
            text-shadow: 0 0 26px rgba(70, 220, 255, 0.44);
        }

        @media (max-width: 720px) {
            .page {
                padding: 18px;
            }

            .matrix-layer {
                display: none;
            }

            .energy-layer {
                display: none;
            }

            .login-shell {
                width: min(310px, calc(100vw - 28px));
                border-radius: 20px;
            }

            .login-card {
                min-height: 390px;
                padding: 28px 20px 24px;
                border-radius: 18px;
            }

            .brand {
                grid-template-columns: 42px 1fr;
                column-gap: 13px;
                row-gap: 8px;
                margin-bottom: 24px;
            }

            .brand-mark {
                width: 42px;
                height: 42px;
                border-radius: 13px;
            }

            .brand-mark svg {
                width: 25px;
                height: 25px;
            }

            .brand-title {
                font-size: 23px;
            }

            .brand-subtitle {
                font-size: 12px;
                white-space: nowrap;
            }

            .brand-note {
                max-width: none;
                font-size: 11px;
            }

            .form {
                gap: 14px;
            }

            .field {
                min-height: 42px;
                padding: 0 13px;
                border-radius: 12px;
            }

            .field input {
                font-size: 12px;
            }

            .login-button {
                min-height: 42px;
                margin-top: 11px;
                border-radius: 12px;
                font-size: 13px;
                letter-spacing: 8px;
                text-indent: 8px;
            }

            .links {
                margin-top: 20px;
            }

            .links a {
                font-size: 12px;
            }
        }

        @media (max-height: 700px) and (min-width: 721px) {
            .login-card {
                padding: 20px 25px 19px;
            }

            .brand {
                margin-bottom: 16px;
            }

            .form {
                gap: 11px;
            }

            .field {
                min-height: 38px;
            }

            .login-button {
                min-height: 40px;
                margin-top: 9px;
            }

            .links {
                margin-top: 14px;
            }
        }
    </style>
</head>
<body>
    <svg class="sr-only" aria-hidden="true" focusable="false">
        <symbol id="icon-cognition" viewBox="0 0 24 24">
            <path d="M5 15c1.8-4.2 4.2-6.3 7-6.3s5.2 2.1 7 6.3c-1.8 2.5-4.2 3.8-7 3.8S6.8 17.5 5 15z"/>
            <path d="M12 11.5a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/>
        </symbol>
        <symbol id="icon-project" viewBox="0 0 24 24">
            <path d="M7 4.5h8.5L19 8v11.5H7z"/>
            <path d="M15.5 4.5V8H19M10 11h6M10 15h5"/>
        </symbol>
        <symbol id="icon-ai" viewBox="0 0 24 24">
            <path d="M12 4.5 13.8 9l4.7 1.8-4.7 1.8L12 17l-1.8-4.4-4.7-1.8L10.2 9z"/>
            <path d="M18 15.5 18.8 18l2.2.8-2.2.8L18 22l-.8-2.4-2.2-.8 2.2-.8z"/>
        </symbol>
        <symbol id="icon-operation" viewBox="0 0 24 24">
            <path d="M5 13h3.5l7.5 4V7l-7.5 4H5z"/>
            <path d="M8.5 13.2 10 19M18 10.5c1.1.8 1.6 2.2 1.2 3.5"/>
        </symbol>
        <symbol id="icon-delivery" viewBox="0 0 24 24">
            <path d="M4.5 8.5 12 4l7.5 4.5v7L12 20l-7.5-4.5z"/>
            <path d="M4.8 8.7 12 13l7.2-4.3M12 13v6.6"/>
        </symbol>
        <symbol id="icon-quality" viewBox="0 0 24 24">
            <path d="M12 4.5 18.5 7v5.2c0 3.6-2.5 6.5-6.5 7.8-4-1.3-6.5-4.2-6.5-7.8V7z"/>
            <path d="m9 12.5 2 2 4-4"/>
        </symbol>
        <symbol id="icon-user" viewBox="0 0 24 24">
            <path d="M12 11.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"/>
            <path d="M5.5 20c.8-3.7 3-5.5 6.5-5.5s5.7 1.8 6.5 5.5"/>
        </symbol>
        <symbol id="icon-support" viewBox="0 0 24 24">
            <path d="M5 13v-1a7 7 0 0 1 14 0v1"/>
            <path d="M5 13.5h3v4H6.5A1.5 1.5 0 0 1 5 16zM19 13.5h-3v4h1.5A1.5 1.5 0 0 0 19 16z"/>
            <path d="M16 17.5c-.8 1.5-2 2.2-4 2.2"/>
        </symbol>
    </svg>
    <main class="page">
        <div class="matrix-layer" aria-hidden="true">
            <div class="matrix-panel left">
                <div class="matrix-column c1">
                    <span class="matrix-tile dim"></span>
                    <span class="matrix-tile module cognition">
                        <span class="module-label">认知</span>
                    </span>
                    <span class="matrix-tile" style="--alpha:.34;--hi:.42;--mid:.30;--lo:.22"></span>
                    <span class="matrix-tile blank"></span>
                    <span class="matrix-tile" style="--alpha:.26"></span>
                    <span class="matrix-tile dim"></span>
                </div>
                <div class="matrix-column c2">
                    <span class="matrix-tile" style="--alpha:.20"></span>
                    <span class="matrix-tile" style="--alpha:.38;--hi:.44;--mid:.32;--lo:.26"></span>
                    <span class="matrix-tile blank"></span>
                    <span class="matrix-tile dim"></span>
                    <span class="matrix-tile" style="--alpha:.30"></span>
                </div>
                <div class="matrix-column c3">
                    <span class="matrix-tile dim"></span>
                    <span class="matrix-tile blank"></span>
                    <span class="matrix-tile module project">
                        <span class="module-label">项目</span>
                    </span>
                    <span class="matrix-tile" style="--alpha:.18"></span>
                    <span class="matrix-tile blank"></span>
                    <span class="matrix-tile dim"></span>
                </div>
                <div class="matrix-column c7">
                    <span class="matrix-tile" style="--alpha:.16"></span>
                    <span class="matrix-tile dim"></span>
                    <span class="matrix-tile blank"></span>
                    <span class="matrix-tile" style="--alpha:.28;--hi:.38;--mid:.28;--lo:.22"></span>
                    <span class="matrix-tile dim"></span>
                </div>
                <div class="matrix-column c4">
                    <span class="matrix-tile module ai">
                        <span class="module-label">AI</span>
                    </span>
                    <span class="matrix-tile blank"></span>
                    <span class="matrix-tile dim"></span>
                    <span class="matrix-tile" style="--alpha:.22"></span>
                </div>
                <div class="matrix-column c8">
                    <span class="matrix-tile dim"></span>
                    <span class="matrix-tile" style="--alpha:.22"></span>
                    <span class="matrix-tile blank"></span>
                    <span class="matrix-tile module operation">
                        <span class="module-label">运营</span>
                    </span>
