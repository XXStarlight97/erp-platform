<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蓝鲸跨境ERP - 中枢汇聚动效登录</title>
    <style>
        :root {
            --blue-900: #0b2f8a;
            --blue-700: #155eef;
            --blue-500: #2f80ff;
            --blue-300: #79c6ff;
            --cyan: #33d5ff;
            --ink: #10213b;
            --muted: #61738c;
            --line: rgba(47, 128, 255, 0.22);
            --panel: rgba(255, 255, 255, 0.78);
            --font-family: "Aptos", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--ink);
            font-family: var(--font-family);
            background:
                radial-gradient(circle at 16% 12%, rgba(51, 213, 255, 0.32), transparent 30%),
                radial-gradient(circle at 86% 18%, rgba(47, 128, 255, 0.26), transparent 34%),
                linear-gradient(145deg, #f7fbff 0%, #e8f4ff 48%, #d7ebff 100%);
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                url("assets/bluewhale-page-small-top-bg.png") center bottom / cover no-repeat;
            opacity: 0.62;
            mix-blend-mode: multiply;
            z-index: 0;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(21, 94, 239, 0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(21, 94, 239, 0.06) 1px, transparent 1px);
            background-size: 42px 42px;
            mask-image: radial-gradient(circle at center, #000 0%, transparent 72%);
            z-index: 1;
        }

        .ai-regions {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .ai-region {
            position: absolute;
            color: rgba(18, 100, 214, 0.34);
            font-family: "SFMono-Regular", Consolas, monospace;
        }

        .matrix-region {
            left: 2.4vw;
            top: 15vh;
            width: 15vw;
            height: 39vh;
            overflow: hidden;
            opacity: 0.86;
            mask-image: linear-gradient(180deg, transparent, #000 18%, #000 82%, transparent);
        }

        .matrix-region::before,
        .bottom-code::before {
            content: "ERP.sync\\A AI.route\\A order.flow\\A gate.pass\\A quality.check\\A user.map\\A 0101 1010\\A ops.ready\\A metric++\\A data.trace\\A";
            position: absolute;
            inset: 0;
            white-space: pre-line;
            font-size: 15px;
            line-height: 1.85;
            letter-spacing: 0.08em;
            text-shadow: 0 0 12px rgba(51, 213, 255, 0.32);
            animation: codeColumn 16s linear infinite;
        }

        .matrix-region::after {
            content: "";
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(47,128,255,0.12) 1px, transparent 1px),
                linear-gradient(90deg, rgba(47,128,255,0.10) 1px, transparent 1px);
            background-size: 26px 26px;
            opacity: 0.34;
        }

        .bottom-code {
            display: none;
            left: 8vw;
            bottom: 2.6vh;
            width: 16vw;
            height: 17vh;
            overflow: hidden;
            opacity: 0.78;
            mask-image: linear-gradient(180deg, transparent, #000 20%, #000 74%, transparent);
        }

        .bottom-code::before {
            content: "0101\\A ERP.sync()\\A AI.route\\A ops: true\\A stock[42]\\A order.flow\\A API.ready\\A";
            font-size: 14px;
            line-height: 1.7;
            animation-duration: 12s;
        }

        .whale-scan {
            display: none;
        }

        .whale-scan::before {
            display: none;
            content: "";
            position: absolute;
            left: -30%;
            top: 24%;
            width: 160%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.92), rgba(51,213,255,0.56), transparent);
            box-shadow: 0 0 18px rgba(51,213,255,0.44);
            animation: whaleScan 7.5s ease-in-out infinite;
        }

        .whale-scan::after {
            display: none;
            content: "";
            position: absolute;
            inset: 18% 4% 18% 8%;
            background-image: radial-gradient(circle, rgba(255,255,255,0.72) 0 1px, transparent 1.6px);
            background-size: 22px 22px;
            opacity: 0.18;
            animation: dotFlicker 4.8s ease-in-out infinite;
        }

        .network-pulse {
            display: none;
            right: 2.6vw;
            bottom: 2.8vh;
            width: 10vw;
            height: 21vh;
        }

        .network-pulse span {
            position: absolute;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.78);
            box-shadow: 0 0 18px rgba(51, 213, 255, 0.62);
            animation: networkPulse 4.5s ease-in-out infinite;
        }

        .network-pulse span:nth-child(1) { left: 12%; top: 72%; animation-delay: -0.4s; }
        .network-pulse span:nth-child(2) { left: 58%; top: 48%; animation-delay: -1.7s; }
        .network-pulse span:nth-child(3) { left: 84%; top: 18%; animation-delay: -3s; }

        .network-pulse::before,
        .network-pulse::after {
            content: "";
            position: absolute;
            height: 1px;
            transform-origin: left center;
            background: linear-gradient(90deg, rgba(255,255,255,0), rgba(51,213,255,0.42), rgba(255,255,255,0));
            animation: linkGlow 4.5s ease-in-out infinite;
        }

        .network-pulse::before {
            left: 17%;
            top: 70%;
            width: 64%;
            transform: rotate(-28deg);
        }

        .network-pulse::after {
            left: 61%;
            top: 48%;
            width: 42%;
            transform: rotate(-44deg);
            animation-delay: -1.4s;
        }

        @keyframes codeColumn {
            0% { transform: translateY(32%); opacity: 0; }
            14% { opacity: 1; }
            86% { opacity: 0.9; }
            100% { transform: translateY(-70%); opacity: 0; }
        }

        @keyframes whaleScan {
            0%, 100% { transform: translateY(-42px); opacity: 0; }
            18%, 72% { opacity: 0.85; }
            52% { transform: translateY(120px); opacity: 0.72; }
        }

        @keyframes dotFlicker {
            0%, 100% { opacity: 0.12; transform: scale(0.98); }
            48% { opacity: 0.28; transform: scale(1.02); }
        }

        @keyframes networkPulse {
            0%, 100% { transform: scale(0.74); opacity: 0.28; }
            48% { transform: scale(1.28); opacity: 0.88; }
        }

        @keyframes linkGlow {
            0%, 100% { opacity: 0.18; }
            50% { opacity: 0.74; }
        }

        .bg-mini-icons {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .data-widget {
            --delay: 0s;
            position: absolute;
            width: 106px;
            min-height: 82px;
            padding: 12px;
            border: 1px solid rgba(47, 128, 255, 0.16);
            border-radius: 20px;
            color: rgba(21, 94, 239, 0.46);
            background:
                linear-gradient(145deg, rgba(255,255,255,0.44), rgba(235,248,255,0.16)),
                radial-gradient(circle at 22% 18%, rgba(51,213,255,0.14), transparent 54%);
            box-shadow:
                0 18px 46px rgba(47, 128, 255, 0.10),
                inset 0 1px 0 rgba(255,255,255,0.62);
            backdrop-filter: blur(8px);
            opacity: 0.54;
            animation: miniIconFloat 9s ease-in-out infinite;
            animation-delay: var(--delay);
        }

        .data-widget::before {
            content: "";
            position: absolute;
            inset: -16px;
            border-radius: 28px;
            background-image: radial-gradient(circle, rgba(21,94,239,0.16) 0 1.4px, transparent 1.8px);
            background-size: 13px 13px;
            mask-image: radial-gradient(circle, #000 0 42%, transparent 70%);
            opacity: 0.34;
            animation: miniPixels 6.4s ease-in-out infinite;
            animation-delay: var(--delay);
        }

        .data-widget::after {
            content: "";
            position: absolute;
            left: 12px;
            top: 12px;
            right: 12px;
            height: 2px;
            border-radius: 999px;
            background: linear-gradient(90deg, transparent, rgba(47,128,255,0.58), transparent);
            animation: widgetScan 4.8s ease-in-out infinite;
            animation-delay: calc(var(--delay) - 1s);
        }

        .data-widget.left-top {
            left: clamp(22px, 5.8vw, 112px);
            top: 24vh;
            --delay: -1.2s;
        }

        .data-widget.left-bottom {
            left: clamp(34px, 8vw, 150px);
            bottom: 16vh;
            width: 96px;
            min-height: 76px;
            --delay: -4.6s;
        }

        .data-widget.right-bottom {
            right: clamp(40px, 8.6vw, 166px);
            bottom: 15vh;
            width: 98px;
            min-height: 82px;
            --delay: -6.3s;
        }

        .finance-curve {
            position: absolute;
            left: clamp(24px, 5vw, 98px);
            bottom: 12vh;
            width: 210px;
            height: 138px;
            color: rgba(21, 94, 239, 0.44);
            opacity: 0.66;
            animation: miniIconFloat 10s ease-in-out infinite;
            animation-delay: -4.6s;
        }

        .finance-curve::before {
            content: "";
            position: absolute;
            inset: 6px 14px;
            background-image: radial-gradient(circle, rgba(21,94,239,0.14) 0 1.5px, transparent 1.9px);
            background-size: 18px 18px;
            mask-image: linear-gradient(90deg, transparent, #000 18%, #000 78%, transparent);
            opacity: 0.48;
        }

        .finance-curve svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            overflow: visible;
            filter: drop-shadow(0 0 13px rgba(47,128,255,0.18));
        }

        .curve-line {
            fill: none;
            stroke: url(#moneyCurveGradient);
            stroke-width: 4;
            stroke-linecap: round;
            stroke-dasharray: 360;
            animation: curveFlow 6.2s ease-in-out infinite;
        }

        .money-token {
            position: absolute;
            display: grid;
            place-items: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            color: rgba(21,94,239,0.68);
            border: 1px solid rgba(47,128,255,0.22);
            background: rgba(255,255,255,0.18);
            box-shadow: 0 0 18px rgba(47,128,255,0.14);
            font-size: 15px;
            font-weight: 900;
            animation: metricBeat 5s ease-in-out infinite;
        }

        .money-token.t1 { left: 10px; top: 18px; }
        .money-token.t2 { left: 92px; top: 72px; animation-delay: -1.6s; }
        .money-token.t3 { right: 28px; top: 34px; animation-delay: -3.1s; }

        .table-icon {
            position: absolute;
            right: clamp(30px, 5vw, 96px);
            bottom: clamp(34px, 8vh, 84px);
            width: 128px;
            height: 118px;
            display: grid;
            place-items: center;
            color: rgba(21, 94, 239, 0.42);
            opacity: 0.68;
            animation: miniIconFloat 9s ease-in-out infinite;
            animation-delay: -6.3s;
        }

        .table-icon::before {
            content: "";
            position: absolute;
            inset: -18px;
            border-radius: 24px;
            background-image: radial-gradient(circle, rgba(21,94,239,0.14) 0 1.4px, transparent 1.8px);
            background-size: 13px 13px;
            mask-image: radial-gradient(circle, #000 0 42%, transparent 72%);
            opacity: 0.42;
        }

        .table-icon svg {
            width: 112px;
            height: 100px;
            filter: drop-shadow(0 0 16px rgba(47,128,255,0.20));
        }

        .widget-head {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 10px;
        }

        .widget-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: linear-gradient(135deg, #155eef, #33d5ff);
            box-shadow: 0 0 14px rgba(47,128,255,0.38);
        }

        .widget-line {
            height: 5px;
            flex: 1;
            border-radius: 999px;
            background: rgba(47, 128, 255, 0.18);
        }

        .widget-grid {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }

        .widget-cell {
            height: 12px;
            border-radius: 4px;
            background: rgba(47, 128, 255, 0.16);
        }

        .widget-cell.is-on {
            background: linear-gradient(135deg, rgba(21,94,239,0.58), rgba(51,213,255,0.42));
            box-shadow: 0 0 12px rgba(51,213,255,0.22);
            animation: cellPulse 3.6s ease-in-out infinite;
        }

        .widget-bars {
            position: relative;
            z-index: 1;
            height: 44px;
            display: flex;
            align-items: end;
            gap: 8px;
            padding: 0 6px;
        }

        .widget-bar {
            width: 12px;
            border-radius: 999px 999px 3px 3px;
            background: linear-gradient(180deg, rgba(51,213,255,0.72), rgba(21,94,239,0.44));
            box-shadow: 0 0 13px rgba(47,128,255,0.20);
            animation: barPulse 4s ease-in-out infinite;
        }

        .widget-bar:nth-child(2) { animation-delay: -1.1s; }
        .widget-bar:nth-child(3) { animation-delay: -2.2s; }

        .widget-checkrow {
            position: relative;
            z-index: 1;
            display: grid;
            gap: 7px;
        }

        .check-line {
            display: grid;
            grid-template-columns: 12px 1fr;
            align-items: center;
            gap: 7px;
        }

        .check-line::before {
            content: "";
            width: 10px;
            height: 10px;
            border-radius: 3px;
            border: 1px solid rgba(47,128,255,0.38);
            background: rgba(255,255,255,0.32);
        }

        .check-line::after {
            content: "";
            height: 5px;
            border-radius: 999px;
            background: rgba(47, 128, 255, 0.18);
        }

        .metric-cluster {
            position: absolute;
            right: clamp(24px, 5vw, 104px);
            top: 18vh;
            width: 190px;
            height: 150px;
            opacity: 0.76;
            animation: miniIconFloat 10s ease-in-out infinite;
            animation-delay: -2.2s;
        }

        .metric-bubble {
            position: absolute;
            display: grid;
            place-items: center;
            color: rgba(21, 94, 239, 0.54);
            font-weight: 950;
            letter-spacing: 0;
            text-shadow:
                0 0 18px rgba(51,213,255,0.24),
                0 10px 28px rgba(47,128,255,0.18);
            animation: metricBeat 5.2s ease-in-out infinite;
        }

        .metric-bubble.big {
            right: 18px;
            top: 26px;
            width: 82px;
            height: 54px;
            font-size: 19px;
        }

        .metric-bubble.mid {
            left: 18px;
            top: 62px;
            width: 66px;
            height: 44px;
            font-size: 15px;
            animation-delay: -1.6s;
        }

        .metric-bubble.small {
            right: 44px;
            bottom: 6px;
            width: 56px;
            height: 38px;
            border-radius: 16px;
            font-size: 13px;
            animation-delay: -3s;
        }

        @keyframes miniIconFloat {
            0%, 100% { transform: translate3d(0, 0, 0) scale(1); opacity: 0.42; }
            48% { transform: translate3d(0, -14px, 0) scale(1.03); opacity: 0.68; }
        }

        @keyframes miniPixels {
            0%, 100% { transform: translateY(5px); opacity: 0.28; }
            50% { transform: translateY(-5px); opacity: 0.58; }
        }

        @keyframes miniRing {
            0%, 100% { transform: scale(0.86); opacity: 0.32; }
            50% { transform: scale(1.08); opacity: 0.66; }
        }

        @keyframes widgetScan {
            0%, 100% { transform: translateY(0); opacity: 0; }
            30% { opacity: 0.72; }
            60% { transform: translateY(46px); opacity: 0.12; }
        }

        @keyframes cellPulse {
            0%, 100% { opacity: 0.45; }
            50% { opacity: 0.92; }
        }

        @keyframes barPulse {
            0%, 100% { transform: scaleY(0.74); opacity: 0.54; }
            50% { transform: scaleY(1); opacity: 0.92; }
        }

        @keyframes metricBeat {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.56; }
            50% { transform: translateY(-5px) scale(1.035); opacity: 0.88; }
        }

        @keyframes curveFlow {
            0% { stroke-dashoffset: 360; opacity: 0.32; }
            42%, 78% { opacity: 0.82; }
            100% { stroke-dashoffset: 0; opacity: 0.42; }
        }

        @keyframes pointPulse {
            0%, 100% { transform: scale(0.86); opacity: 0.58; }
            50% { transform: scale(1.12); opacity: 0.95; }
        }

        .shell {
            width: min(1120px, 94vw);
            min-height: min(680px, 88vh);
            position: relative;
            z-index: 2;
            display: grid;
            grid-template-columns: minmax(0, 1.08fr) 430px;
            overflow: hidden;
            border: 1px solid rgba(54, 139, 255, 0.34);
            border-radius: 30px;
            background:
                linear-gradient(135deg, rgba(255,255,255,0.82), rgba(239,248,255,0.58)),
                radial-gradient(circle at 18% 84%, rgba(47,128,255,0.12), transparent 42%);
            box-shadow:
                0 36px 100px rgba(42, 109, 202, 0.20),
                0 0 0 8px rgba(255,255,255,0.42),
                inset 0 1px 0 rgba(255,255,255,0.86);
            backdrop-filter: blur(18px);
        }

        .left-panel {
            position: relative;
            padding: 44px 46px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        .left-panel::after {
            content: "";
            position: absolute;
            inset: auto -18% -28% -18%;
            height: 50%;
            background: radial-gradient(ellipse at center, rgba(47, 128, 255, 0.22), transparent 66%);
            pointer-events: none;
        }

        .brand {
            position: relative;
            z-index: 2;
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 13px;
        }

        .logo-icon {
            width: 46px;
            height: 46px;
            display: grid;
            place-items: center;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--blue-700), var(--cyan));
            box-shadow: 0 14px 34px rgba(21, 94, 239, 0.28);
        }

        .logo-icon svg {
            width: 27px;
            height: 27px;
            color: white;
        }

        .logo-text {
            font-size: 27px;
            font-weight: 900;
            color: #1056d8;
            letter-spacing: 0;
        }

        .brand-desc {
            margin-top: 9px;
            max-width: 520px;
            color: #51667f;
            font-size: 15px;
            font-weight: 700;
            line-height: 1.45;
        }

        .brand-note {
            margin-top: 8px;
            max-width: none;
            color: #6a7c92;
            font-size: 12px;
            line-height: 1.5;
            white-space: nowrap;
        }

        .flow-area {
            position: relative;
            z-index: 2;
            flex: 1;
            min-height: 458px;
            margin: 20px 0 0;
        }

        .flow-line {
            position: absolute;
            inset: 0;
        }

        .flow-line svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .route {
            fill: none;
            stroke: rgba(47, 128, 255, 0.24);
            stroke-width: 2;
            stroke-dasharray: 7 9;
            stroke-linecap: round;
        }

        .route-active {
            fill: none;
            stroke: url(#flowGradient);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-dasharray: 70 390;
            animation: flow 4.2s linear infinite;
            filter: drop-shadow(0 0 10px rgba(51, 213, 255, 0.62));
        }

        @keyframes flow {
            to { stroke-dashoffset: -460; }
        }

        .node {
            position: absolute;
            width: 112px;
            min-height: 82px;
            padding: 12px;
            border: 1px solid rgba(47, 128, 255, 0.18);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.74);
            box-shadow:
                0 18px 42px rgba(34, 102, 190, 0.14),
                inset 0 1px 0 rgba(255,255,255,0.88);
            backdrop-filter: blur(12px);
            animation: nodePulse 3.8s ease-in-out infinite;
        }

        .node:nth-of-type(odd) {
            animation-delay: -1.2s;
        }

        @keyframes nodePulse {
            0%, 100% { transform: translateY(0); box-shadow: 0 18px 42px rgba(34, 102, 190, 0.14), inset 0 1px 0 rgba(255,255,255,0.88); }
            50% { transform: translateY(-5px); box-shadow: 0 24px 52px rgba(34, 102, 190, 0.20), inset 0 1px 0 rgba(255,255,255,0.94); }
        }

        .node .icon {
            width: 34px;
            height: 34px;
            display: grid;
            place-items: center;
            margin-bottom: 9px;
            border-radius: 10px;
            color: white;
            background: linear-gradient(135deg, var(--blue-700), var(--cyan));
        }

        .node .text-icon {
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 0;
        }

        .node .icon svg {
            width: 19px;
            height: 19px;
        }

        .node b {
            display: block;
            color: #15365f;
            font-size: 14px;
            line-height: 1.2;
        }

        .node span {
            display: block;
            margin-top: 5px;
            color: #6a7d95;
            font-size: 11px;
            white-space: nowrap;
        }

        .cognition { left: 2%; top: 20%; }
        .project { left: 27%; top: 8%; }
        .ai { left: 51%; top: 20%; }
        .ops { left: 75%; top: 8%; }
        .delivery { left: 15%; top: 66%; }
        .quality { left: 39%; top: 75%; }
        .user { left: 63%; top: 66%; }
        .support { left: 78%; top: 41%; }

        .hub-flow {
            min-height: 430px;
            margin-top: 28px;
        }

        .hub-flow::before {
            content: "";
            position: absolute;
            left: 50%;
            top: 51%;
            width: 310px;
            height: 310px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            background:
                radial-gradient(circle, rgba(47,128,255,0.13), transparent 58%),
                conic-gradient(from 90deg, rgba(51,213,255,0), rgba(47,128,255,0.18), rgba(255,255,255,0), rgba(47,128,255,0.14), rgba(51,213,255,0));
            filter: blur(0.2px);
            opacity: 0.72;
            pointer-events: none;
            animation: hubAura 10s linear infinite;
        }

        .hub-flow .flow-line {
            inset: 8px 18px 0;
            opacity: 0.92;
        }

        .hub-line {
            fill: none;
            stroke: rgba(111, 180, 255, 0.26);
            stroke-width: 1.45;
            stroke-linecap: round;
        }

        .hub-line.energy {
            stroke: url(#hubGradient);
            stroke-width: 2.1;
            stroke-dasharray: 34 260;
            filter: drop-shadow(0 0 8px rgba(51, 213, 255, 0.55));
            animation: hubCurrent 4.6s linear infinite;
        }

        .hub-line.energy:nth-of-type(10) { animation-delay: -0.5s; }
        .hub-line.energy:nth-of-type(11) { animation-delay: -1.0s; }
        .hub-line.energy:nth-of-type(12) { animation-delay: -1.5s; }
        .hub-line.energy:nth-of-type(13) { animation-delay: -2.0s; }
        .hub-line.energy:nth-of-type(14) { animation-delay: -2.5s; }
        .hub-line.energy:nth-of-type(15) { animation-delay: -3.0s; }
        .hub-line.energy:nth-of-type(16) { animation-delay: -3.5s; }
        .hub-line.energy:nth-of-type(17) { animation-delay: -4.0s; }

        .hub-node {
            position: absolute;
            left: 50%;
            top: 51%;
            z-index: 3;
            width: 126px;
            height: 126px;
            display: grid;
            place-items: center;
            border: 1px solid rgba(47, 128, 255, 0.28);
            border-radius: 32px;
            transform: translate(-50%, -50%);
            background:
                linear-gradient(145deg, rgba(255,255,255,0.78), rgba(231,246,255,0.58)),
                radial-gradient(circle at 30% 24%, rgba(255,255,255,0.96), transparent 42%);
            box-shadow:
                0 24px 58px rgba(47, 128, 255, 0.18),
                inset 0 0 0 1px rgba(255,255,255,0.72),
                inset 0 -18px 42px rgba(47,128,255,0.08);
            backdrop-filter: blur(14px);
            animation: hubBreathe 4.8s ease-in-out infinite;
        }

        .hub-node::before {
            content: "";
            position: absolute;
            inset: -10px;
            border-radius: 38px;
            border: 1px solid rgba(51, 213, 255, 0.20);
            box-shadow: 0 0 42px rgba(51, 213, 255, 0.18);
        }

        .hub-icon {
            width: 48px;
            height: 48px;
            display: grid;
            place-items: center;
            margin: 0 auto 8px;
            border-radius: 15px;
            color: #fff;
            background: linear-gradient(135deg, #155eef, #25c7ff);
            box-shadow: 0 16px 30px rgba(21, 94, 239, 0.26);
        }

        .hub-icon svg {
            width: 27px;
            height: 27px;
        }

        .hub-title {
            color: #1056d8;
            font-size: 22px;
            line-height: 1;
            font-weight: 950;
            letter-spacing: 0;
            text-align: center;
        }

        .hub-sub {
            margin-top: 6px;
            color: #6a7d95;
            font-size: 10px;
            font-weight: 800;
            text-align: center;
        }

        .hub-flow .node {
            width: 138px;
            min-height: 54px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 16px;
            background:
                linear-gradient(145deg, rgba(255,255,255,0.76), rgba(242,250,255,0.46));
            box-shadow:
                0 16px 38px rgba(34, 102, 190, 0.11),
                inset 0 1px 0 rgba(255,255,255,0.92);
            animation: nodeFloat 4.6s ease-in-out infinite;
        }

        .hub-flow .node:nth-of-type(odd) {
            animation-delay: -1.1s;
        }

        .hub-flow .node .icon {
            width: 31px;
            height: 31px;
            flex: 0 0 auto;
            margin: 0;
            border-radius: 10px;
        }

        .hub-flow .node .icon svg {
            width: 17px;
            height: 17px;
        }

        .node-copy {
            min-width: 0;
        }

        .hub-flow .node b {
            font-size: 13px;
            line-height: 1.1;
            white-space: nowrap;
        }

        .hub-flow .node span {
            margin-top: 4px;
            font-size: 10px;
        }

        .hub-flow .cognition { left: 2%; top: 8%; }
        .hub-flow .project { left: 8%; top: 31%; }
        .hub-flow .delivery { left: 8%; top: 59%; }
        .hub-flow .quality { left: 2%; top: 82%; }
        .hub-flow .ai { left: auto; right: 2%; top: 8%; }
        .hub-flow .ops { left: auto; right: 8%; top: 31%; }
        .hub-flow .user { left: auto; right: 8%; top: 59%; }
        .hub-flow .support { left: auto; right: 2%; top: 82%; }

        @keyframes hubCurrent {
            to { stroke-dashoffset: -294; }
        }

        @keyframes hubBreathe {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.025); }
        }

        @keyframes nodeFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        @keyframes hubAura {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .right-panel {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 54px 48px;
            border-left: 1px solid rgba(47, 128, 255, 0.16);
            background:
                linear-gradient(180deg, rgba(255,255,255,0.84), rgba(245,250,255,0.72)),
                radial-gradient(circle at 80% 18%, rgba(51,213,255,0.14), transparent 38%);
        }

        .login-header {
            margin-bottom: 34px;
        }

        .login-title {
            color: #10213b;
            font-size: 31px;
            font-weight: 900;
            letter-spacing: 0;
        }

        .login-subtitle {
            margin-top: 10px;
            color: var(--muted);
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #34465d;
            font-size: 13px;
            font-weight: 800;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            min-height: 52px;
            padding: 0 15px;
            border: 1px solid rgba(47, 128, 255, 0.18);
            border-radius: 14px;
            background: rgba(255,255,255,0.72);
            transition: border-color .2s, box-shadow .2s, background .2s;
        }

        .input-wrapper:focus-within {
            border-color: rgba(21, 94, 239, 0.62);
            background: rgba(255,255,255,0.90);
            box-shadow: 0 0 0 4px rgba(47, 128, 255, 0.11);
        }

        .input-icon {
            width: 19px;
            height: 19px;
            margin-right: 11px;
            color: #6f86a3;
        }

        .input-field {
            flex: 1;
            min-width: 0;
            border: 0;
            outline: 0;
            padding: 15px 0;
            color: #10213b;
            background: transparent;
            font: inherit;
            font-size: 15px;
        }

        .input-field::placeholder {
            color: #9caabe;
        }

        .action-icon {
            width: 22px;
            height: 22px;
            border: 0;
            display: grid;
            place-items: center;
            color: #7b8fa8;
            background: transparent;
            cursor: pointer;
        }

        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin: -4px 0 30px;
            color: var(--muted);
            font-size: 13px;
        }

        .remember-me {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }

        .checkbox {
            appearance: none;
            width: 16px;
            height: 16px;
            border: 1px solid rgba(47, 128, 255, 0.34);
            border-radius: 4px;
            background: white;
        }

        .checkbox:checked {
            background: linear-gradient(135deg, var(--blue-700), var(--cyan));
        }

        a {
            color: #155eef;
            text-decoration: none;
        }

        .btn-submit {
            width: 100%;
            min-height: 52px;
            border: 0;
            border-radius: 14px;
            color: white;
            background: linear-gradient(180deg, #3d92ff, #155eef);
            box-shadow: 0 16px 36px rgba(21, 94, 239, 0.28), inset 0 1px 0 rgba(255,255,255,0.34);
            font-size: 17px;
            font-weight: 900;
            cursor: pointer;
        }

        .register-link {
            margin-top: 34px;
            text-align: center;
            color: var(--muted);
            font-size: 13px;
        }

        .mobile-logo {
            display: none;
            align-items: center;
            gap: 12px;
            margin-bottom: 34px;
        }

        @media (max-width: 980px) {
            body { overflow: auto; }
            .shell {
                grid-template-columns: 1fr;
                min-height: auto;
            }
            .left-panel {
                min-height: 560px;
            }
            .right-panel {
                border-left: 0;
                border-top: 1px solid rgba(47, 128, 255, 0.16);
                padding: 38px 30px 44px;
            }
            .mobile-logo {
                display: flex;
            }
            .bg-mini-icons {
                display: none;
            }
        }

        @media (max-width: 640px) {
            body { align-items: stretch; }
            .shell {
                width: 100%;
                min-height: 100vh;
                border-radius: 0;
                box-shadow: none;
            }
            .left-panel {
                display: none;
            }
            .right-panel {
                min-height: 100vh;
            }
            .form-options {
                align-items: flex-start;
                flex-direction: column;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .matrix-region::before,
            .bottom-code::before,
            .whale-scan::before,
            .whale-scan::after,
            .network-pulse,
            .network-pulse span,
            .network-pulse::before,
            .network-pulse::after,
            .route-active,
            .hub-line.energy,
            .hub-node,
            .hub-flow::before,
            .data-widget,
            .data-widget::before,
            .data-widget::after,
            .widget-cell.is-on,
            .widget-bar,
            .metric-cluster,
            .metric-bubble,
            .finance-curve,
            .finance-curve::before,
            .curve-line,
            .money-token,
            .table-icon,
            .node {
                animation: none;
            }
        }
    </style>
</head>
<body>
    <div class="ai-regions" aria-hidden="true">
        <div class="ai-region matrix-region"></div>
        <div class="ai-region bottom-code"></div>
        <div class="ai-region network-pulse">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
    <div class="bg-mini-icons" aria-hidden="true">
        <div class="finance-curve">
            <svg viewBox="0 0 210 138" aria-hidden="true">
                <defs>
                    <linearGradient id="moneyCurveGradient" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0%" stop-color="#33d5ff" stop-opacity="0.16"/>
                        <stop offset="42%" stop-color="#155eef" stop-opacity="0.72"/>
                        <stop offset="100%" stop-color="#33d5ff" stop-opacity="0.28"/>
                    </linearGradient>
                </defs>
                <path id="moneyCurvePath" class="curve-line" d="M6 82 C32 24 58 112 88 58 C116 8 132 132 166 84 C184 58 194 62 204 68"/>
            </svg>
            <span class="money-token t1">$</span>
            <span class="money-token t2">$</span>
            <span class="money-token t3">$</span>
        </div>
        <div class="metric-cluster">
            <span class="metric-bubble big">+88%</span>
            <span class="metric-bubble mid">99.9%</span>
            <span class="metric-bubble small">3.2s</span>
        </div>
        <div class="table-icon">
            <svg viewBox="0 0 90 78" fill="none" aria-hidden="true">
                <rect x="18" y="44" width="12" height="22" rx="5" fill="currentColor" opacity="0.32"/>
                <rect x="38" y="30" width="12" height="36" rx="5" fill="currentColor" opacity="0.50"/>
                <rect x="58" y="18" width="12" height="48" rx="5" fill="currentColor" opacity="0.70"/>
                <path d="M12 68h64" stroke="currentColor" stroke-width="3" stroke-linecap="round" opacity="0.20"/>
            </svg>
        </div>
    </div>
    <main class="shell">
        <section class="left-panel" aria-label="蓝鲸跨境ERP业务流">
            <div class="brand">
                <div class="logo-row">
                    <div class="logo-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M2 12h4l3-9 5 18 3-9h5"/>
                        </svg>
                    </div>
                    <span class="logo-text">蓝鲸跨境ERP</span>
                </div>
                <p class="brand-desc">一站式跨境业务协同入口</p>
                <p class="brand-note">由企业认知、项目、AI、运营、交付、质量、用户和支持八个平台，组成跨境业务的一站式协同入口。</p>
            </div>

            <div class="flow-area hub-flow">
                <div class="flow-line" aria-hidden="true">
                    <svg viewBox="0 0 680 440" preserveAspectRatio="none">
                        <defs>
                            <linearGradient id="hubGradient" x1="0" y1="0" x2="1" y2="0">
                                <stop offset="0%" stop-color="#155eef" stop-opacity="0"/>
                                <stop offset="42%" stop-color="#33d5ff"/>
                                <stop offset="72%" stop-color="#155eef"/>
                                <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
                            </linearGradient>
                        </defs>
                        <path class="hub-line" d="M120 66 C212 68 258 132 315 196" />
                        <path class="hub-line" d="M158 166 C232 166 276 190 315 214" />
                        <path class="hub-line" d="M158 286 C232 286 276 250 315 226" />
                        <path class="hub-line" d="M120 386 C210 374 254 304 315 244" />
                        <path class="hub-line" d="M560 66 C468 68 422 132 365 196" />
                        <path class="hub-line" d="M522 166 C448 166 404 190 365 214" />
                        <path class="hub-line" d="M522 286 C448 286 404 250 365 226" />
                        <path class="hub-line" d="M560 386 C470 374 426 304 365 244" />
                        <path class="hub-line energy" d="M120 66 C212 68 258 132 315 196" />
                        <path class="hub-line energy" d="M158 166 C232 166 276 190 315 214" />
                        <path class="hub-line energy" d="M158 286 C232 286 276 250 315 226" />
                        <path class="hub-line energy" d="M120 386 C210 374 254 304 315 244" />
                        <path class="hub-line energy" d="M560 66 C468 68 422 132 365 196" />
                        <path class="hub-line energy" d="M522 166 C448 166 404 190 365 214" />
                        <path class="hub-line energy" d="M522 286 C448 286 404 250 365 226" />
                        <path class="hub-line energy" d="M560 386 C470 374 426 304 365 244" />
                    </svg>
                </div>

                <div class="hub-node">
                    <div>
                        <div class="hub-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M4 7h16"/>
                                <path d="M4 12h16"/>
                                <path d="M4 17h10"/>
                                <rect x="3" y="4" width="18" height="16" rx="3"/>
                            </svg>
                        </div>
                        <div class="hub-title">ERP</div>
                        <div class="hub-sub">业务中枢</div>
                    </div>
                </div>

                <div class="node cognition">
                    <div class="icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 18h6"/>
                            <path d="M10 22h4"/>
                            <path d="M8.5 14.5A6 6 0 1 1 15.5 14.5c-.9.55-1.5 1.45-1.5 2.5h-4c0-1.05-.6-1.95-1.5-2.5Z"/>
                        </svg>
                    </div>
                    <div class="node-copy"><b>认知平台</b><span>知识沉淀</span></div>
                </div>
                <div class="node project">
                    <div class="icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M8 6h13"/>
                            <path d="M8 12h13"/>
                            <path d="M8 18h13"/>
                            <path d="M3 6h.01"/>
                            <path d="M3 12h.01"/>
                            <path d="M3 18h.01"/>

                    </div>
                    <div class="node-copy"><b>项目平台</b><span>项目协同</span></div>

                            <path d="M5 12h14"/>
                            <path d="m13 6 6 6-6 6"/>
                            <path d="M5 6v12"/>
                        </svg>
                    </div>
                    <div class="node-copy"><b>交付平台</b><span>履约推进</span></div>
                </div>
                <div class="node quality">
                    <div class="icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/>
                            <path d="m9 12 2 2 4-5"/>
                        </svg>
                    </div>
                    <div class="node-copy"><b>质量平台</b><span>准入准出</span></div>
                </div>
                <div class="node ai">
                    <div class="icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2v3"/>
                            <path d="M12 19v3"/>
                            <path d="M4.93 4.93 7.05 7.05"/>
                            <path d="M16.95 16.95 19.07 19.07"/>
                            <path d="M2 12h3"/>
                            <path d="M19 12h3"/>
                            <circle cx="12" cy="12" r="4"/>
                        </svg>
                    </div>
                    <div class="node-copy"><b>AI 平台</b><span>智能助手</span></div>
                </div>
                <div class="node ops">
                    <div class="icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 20V10"/>
                            <path d="M10 20V4"/>
                            <path d="M16 20v-7"/>
                            <path d="M22 20H2"/>
                        </svg>
                    </div>
                    <div class="node-copy"><b>运营平台</b><span>渠道作战</span></div>
                </div>
                <div class="node user">
                    <div class="icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M16 21v-2a4 4 0 0 0-8 0v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                    <div class="node-copy"><b>用户平台</b><span>体验关系</span></div>
                </div>
                <div class="node support">
                    <div class="icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">

                            <path d="M3 19a2 2 0 0 0 2 2h2v-7H3v5Z"/>

                </div>

        </section>

        <section class="right-panel" aria-label="登录表单">
            <div class="mobile-logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M2 12h4l3-9 5 18 3-9h5"/>
                    </svg>
                </div>
                <span class="logo-text">蓝鲸跨境ERP</span>
            </div>

            <div class="login-header">
                <h2 class="login-title">欢迎登录</h2>
                <p class="login-subtitle">登录您的账号以继续使用系统</p>
            </div>

            <form>
                <div class="form-group">
                    <label class="form-label" for="account">用户名 / 手机号码</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        <input id="account" type="text" class="input-field" placeholder="请输入用户名或手机号" autocomplete="username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">密码</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        <input id="password" type="password" class="input-field" placeholder="请输入密码" autocomplete="current-password" required>
                        <button type="button" class="action-icon" aria-label="显示密码">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" class="checkbox">
                        记住我
                    </label>
                    <a href="#">忘记密码？</a>
                </div>

                <button type="submit" class="btn-submit">登 录</button>
            </form>

            <div class="register-link">
                还没有账号？ <a href="#">立即注册</a>
            </div>
        </section>
    </main>
</body>
</html>
